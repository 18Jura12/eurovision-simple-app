<div class="login-page">
  <div class="login-card">
    <a routerLink="/result" class="logo-link">
      <img src="../../assets/esc2026logo.jpg" class="logo-img" alt="Eurovision 2026">
    </a>

    <form [formGroup]="nameForm" (ngSubmit)="setLogin()" class="mt-3">
      <input
        type="text"
        class="form-control name-input"
        formControlName="name"
        placeholder="Enter your name"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false">
      <div class="error-msg" *ngIf="nameControl.invalid && nameControl.dirty">
        <ng-container *ngIf="nameControl.errors?.['required'] || nameControl.errors?.['minlength']">
          Name must be at least 2 characters.
        </ng-container>
        <ng-container *ngIf="nameControl.errors?.['maxlength']">
          Name is too long.
        </ng-container>
        <ng-container *ngIf="nameControl.errors?.['pattern']">
          Only letters, spaces and hyphens (e.g. Ana, Ana-Marija).
        </ng-container>
      </div>
      <button type="submit" class="btn btn-enter w-100 mt-3" [disabled]="nameForm.invalid">
        Enter
      </button>
    </form>

    <div class="text-center mt-3">
      <a routerLink="/admin" class="admin-link">⚙ Admin</a>
    </div>
  </div>
</div>
